name: team-codex5
project: Soul-Brews-Studio/maw-rs
session: 182-maw-rs

goal: |
  Port maw-js to maw-rs — 21 crates, 3 waves (leaf → mid → core).
  Lead dispatches precise tasks to omx coders in isolated worktrees.
  Coders own the loop to done-criteria. PR → alpha only, never main.
  cargo build + cargo test + cargo clippy -- -D warnings = green.

defaults:
  worktree: true

engines:
  codex-1: "CODEX_HOME=$HOME/.codex-team/1 codex -a never -s none"
  codex-2: "CODEX_HOME=$HOME/.codex-team/2 codex -a never -s none"
  codex-3: "CODEX_HOME=$HOME/.codex-team/3 codex -a never -s none"
  codex-4: "CODEX_HOME=$HOME/.codex-team/4 codex -a never -s none"
  codex-5: "CODEX_HOME=$HOME/.codex-team/5 codex -a never -s none"

members:
  - role: lead
    name: maw-rs
    engine: claude
    worktree: false
    prompt: |
      Lead orchestrator for maw-rs Rust port. NEVER write code yourself.
      Dispatch via foreground maw hey only (not background &).
      DEFINE done-criteria per task. Let coders OWN the loop.
      NO-GAP DISPATCH: include next task in same message as confirmation.
      Peek team every 15-20 min. Merge is the lead's job.
      PR → alpha only. Serialize merges. Coders rebase after each merge.
      Wave strategy: leaf crates first, then mid (peer/tmux/worktree), then cli.

  # Wave 1 — Leaf crates (no internal deps), 5 parallel coders
  - role: codex-1
    name: codex-1
    engine: codex-1
    branch: agents/codex-1
    prompt: |
      maw-rs codex builder. WAIT for task via maw hey.
      Implement MINIMAL precise code in YOUR worktree.
      OWN the loop: implement -> cargo build -> cargo test -> cargo clippy -> fix -> repeat.
      Done = cargo build + cargo test + cargo clippy -- -D warnings all pass.
      Report: starting/blocked/done signed [182-maw-rs:codex-1].
      Never touch lead's checkout or other coders' worktrees.
      PR → alpha branch only, never main.

  - role: codex-2
    name: codex-2
    engine: codex-2
    branch: agents/codex-2
    prompt: |
      maw-rs codex builder. WAIT for task via maw hey.
      Implement MINIMAL precise code in YOUR worktree.
      OWN the loop: implement -> cargo build -> cargo test -> cargo clippy -> fix -> repeat.
      Done = cargo build + cargo test + cargo clippy -- -D warnings all pass.
      Report: starting/blocked/done signed [182-maw-rs:codex-2].
      Never touch lead's checkout or other coders' worktrees.
      PR → alpha branch only, never main.

  - role: codex-3
    name: codex-3
    engine: codex-3
    branch: agents/codex-3
    prompt: |
      maw-rs codex builder. WAIT for task via maw hey.
      Implement MINIMAL precise code in YOUR worktree.
      OWN the loop: implement -> cargo build -> cargo test -> cargo clippy -> fix -> repeat.
      Done = cargo build + cargo test + cargo clippy -- -D warnings all pass.
      Report: starting/blocked/done signed [182-maw-rs:codex-3].
      Never touch lead's checkout or other coders' worktrees.
      PR → alpha branch only, never main.

  - role: codex-4
    name: codex-4
    engine: codex-4
    branch: agents/codex-4
    prompt: |
      maw-rs codex builder. WAIT for task via maw hey.
      Implement MINIMAL precise code in YOUR worktree.
      OWN the loop: implement -> cargo build -> cargo test -> cargo clippy -> fix -> repeat.
      Done = cargo build + cargo test + cargo clippy -- -D warnings all pass.
      Report: starting/blocked/done signed [182-maw-rs:codex-4].
      Never touch lead's checkout or other coders' worktrees.
      PR → alpha branch only, never main.

  - role: codex-5
    name: codex-5
    engine: codex-5
    branch: agents/codex-5
    prompt: |
      maw-rs codex builder. WAIT for task via maw hey.
      Implement MINIMAL precise code in YOUR worktree.
      OWN the loop: implement -> cargo build -> cargo test -> cargo clippy -> fix -> repeat.
      Done = cargo build + cargo test + cargo clippy -- -D warnings all pass.
      Report: starting/blocked/done signed [182-maw-rs:codex-5].
      Never touch lead's checkout or other coders' worktrees.
      PR → alpha branch only, never main.

# Wave 2 coders (mid-level: maw-peer, maw-tmux, maw-worktree) — spawn after Wave 1 merges
# Wave 3 coder (maw-cli — depends on everything) — spawn after Wave 2 merges

headless:
  mode: exec
  model: gpt-5.5
  reasoning_effort: low
  callback: "maw hey ${session}:maw-rs"
  engines:
    codex-1: "CODEX_HOME=$HOME/.codex-team/1 codex exec --dangerously-bypass-approvals-and-sandbox -m ${model} -c model_reasoning_effort=${reasoning_effort}"
    codex-2: "CODEX_HOME=$HOME/.codex-team/2 codex exec --dangerously-bypass-approvals-and-sandbox -m ${model} -c model_reasoning_effort=${reasoning_effort}"
    codex-3: "CODEX_HOME=$HOME/.codex-team/3 codex exec --dangerously-bypass-approvals-and-sandbox -m ${model} -c model_reasoning_effort=${reasoning_effort}"
    codex-4: "CODEX_HOME=$HOME/.codex-team/4 codex exec --dangerously-bypass-approvals-and-sandbox -m ${model} -c model_reasoning_effort=${reasoning_effort}"
    codex-5: "CODEX_HOME=$HOME/.codex-team/5 codex exec --dangerously-bypass-approvals-and-sandbox -m ${model} -c model_reasoning_effort=${reasoning_effort}"
  exec_template: >
    CODEX_HOME=${codex_home} codex exec
    --dangerously-bypass-approvals-and-sandbox
    -m ${model}
    -c model_reasoning_effort="${reasoning_effort}"
    "${prompt}"
    --json &
  prompt_template: |
    TASK: ${task}
    PROTOCOL:
      1. maw hey ${session}:maw-rs "codex-${n} starting — ${task_short}"
      2. implement -> cargo build -> cargo test -> cargo clippy -> fix -> repeat
      3. git add + commit + gh pr create --base alpha
      4. maw hey ${session}:maw-rs "codex-${n} done — ${task_short} PR#N"
      5. blocked: maw hey ${session}:maw-rs "codex-${n} blocked — <reason>"

lifecycle:
  worktree: true
  merge_on_shutdown: false

# Crate → Wave mapping:
# Wave 1 (leaf, 17 crates — no internal maw-* deps):
#   maw-auth, maw-auto-wake, maw-bind, maw-bring, maw-calver,
#   maw-feed, maw-fuzzy, maw-hub, maw-identity, maw-matcher,
#   maw-plugin-manifest, maw-plugin-scaffold, maw-policy,
#   maw-routing, maw-split, maw-transport, maw-xdg
#
# Wave 2 (mid, 3 crates — depend on Wave 1):
#   maw-peer (→ maw-xdg)
#   maw-tmux (→ maw-matcher, maw-peer)
#   maw-worktree (→ maw-matcher)
#
# Wave 3 (top, 1 crate — depends on everything):
#   maw-cli (→ all 20 crates)
#
# Dispatch plan:
#   codex-1: maw-auth, maw-calver, maw-identity (3 crates)
#   codex-2: maw-fuzzy, maw-matcher, maw-policy (3 crates)
#   codex-3: maw-bind, maw-bring, maw-split (3 crates)
#   codex-4: maw-hub, maw-feed, maw-routing, maw-transport (4 crates)
#   codex-5: maw-xdg, maw-auto-wake, maw-plugin-manifest, maw-plugin-scaffold (4 crates)
